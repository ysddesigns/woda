# Revyl CLI Configuration
# Generated by: revyl init
# Edit these settings or run: revyl config set <key> <value>
# Docs: https://docs.revyl.ai/cli/hot-reload

project:
    name: woda
build:
    system: Expo
    command: npx --yes eas-cli build --platform ios --profile development --local --output build/app.tar.gz
    output: build/app.tar.gz
    platforms:
        android:
            command: npx --yes eas-cli build --platform android --profile development --local --output build/app.apk
            output: build/app.apk
        ios:
            command: npx --yes eas-cli build --platform ios --profile revyl-build --local --output build/app.tar.gz
            output: build/app.tar.gz
defaults:
    open_browser: true
    timeout: 1800
